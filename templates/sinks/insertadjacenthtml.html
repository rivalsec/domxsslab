{% extends "base.html" %}
{% block title %}insertAdjacentHTML Sink{% endblock %}
{% block content %}
<a class="back" href="/">&larr; Back</a>
<h2><span class="badge html">HTML</span> insertAdjacentHTML()</h2>
<div class="card">
<p><b>Source:</b> URL hash or input</p>
<p><b>Sink:</b> <code>element.insertAdjacentHTML('beforeend', userInput)</code></p>
<pre>Try: #&lt;img src=x onerror=alert('insertAdjacentHTML')&gt;</pre>
<select id="position">
  <option value="beforebegin">beforebegin</option>
  <option value="afterbegin">afterbegin</option>
  <option value="beforeend" selected>beforeend</option>
  <option value="afterend">afterend</option>
</select>
<input id="inp" placeholder="Enter HTML payload...">
<button onclick="trigger()">Inject</button>
<h3>Output:</h3>
<div class="output" id="output"></div>
</div>
<script>
function getSource() {
    return document.getElementById('inp').value ||
           new URLSearchParams(location.search).get('input') ||
           (location.hash ? decodeURIComponent(location.hash.slice(1)) : '');
}
function trigger() {
    var pos = document.getElementById('position').value;
    document.getElementById('output').insertAdjacentHTML(pos, getSource());
}
if (location.hash || new URLSearchParams(location.search).get('input')) { window.onload = trigger; }
</script>
{% endblock %}
