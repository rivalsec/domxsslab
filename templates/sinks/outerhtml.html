{% extends "base.html" %}
{% block title %}outerHTML Sink{% endblock %}
{% block content %}
<a class="back" href="/">&larr; Back</a>
<h2><span class="badge html">HTML</span> element.outerHTML</h2>
<div class="card">
<p><b>Source:</b> URL hash or input</p>
<p><b>Sink:</b> <code>element.outerHTML = userInput</code></p>
<pre>Try: #&lt;div&gt;&lt;img src=x onerror=alert('outerHTML')&gt;&lt;/div&gt;</pre>
<input id="inp" placeholder="Enter HTML payload...">
<button onclick="trigger()">Inject</button>
<h3>Output:</h3>
<div class="output"><span id="target">Original content</span></div>
</div>
<script>
function getSource() {
    return document.getElementById('inp').value ||
           new URLSearchParams(location.search).get('input') ||
           (location.hash ? decodeURIComponent(location.hash.slice(1)) : '');
}
function trigger() {
    document.getElementById('target').outerHTML = getSource();
}
if (location.hash || new URLSearchParams(location.search).get('input')) { window.onload = trigger; }
</script>
{% endblock %}
