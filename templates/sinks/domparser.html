{% extends "base.html" %}
{% block title %}DOMParser Sink{% endblock %}
{% block content %}
<a class="back" href="/">&larr; Back</a>
<h2><span class="badge html">HTML</span> DOMParser + adoptNode</h2>
<div class="card">
<p><b>Source:</b> URL hash or input</p>
<p><b>Sink:</b> <code>new DOMParser().parseFromString()</code> → <code>document.adoptNode()</code> → append</p>
<pre>Try: #&lt;img src=x onerror=alert('DOMParser')&gt;</pre>
<input id="inp" placeholder="Enter HTML payload...">
<button onclick="trigger()">Inject</button>
<h3>Output:</h3>
<div class="output" id="output"></div>
</div>
<script>
function getSource() {
    return document.getElementById('inp').value ||
           new URLSearchParams(location.search).get('input') ||
           (location.hash ? decodeURIComponent(location.hash.slice(1)) : '');
}
function trigger() {
    var parser = new DOMParser();
    var doc = parser.parseFromString(getSource(), 'text/html');
    var node = document.adoptNode(doc.body);
    document.getElementById('output').appendChild(node);
}
if (location.hash || new URLSearchParams(location.search).get('input')) { window.onload = trigger; }
</script>
{% endblock %}
