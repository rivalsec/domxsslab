{% extends "base.html" %}
{% block title %}form.action Sink{% endblock %}
{% block content %}
<a class="back" href="/">&larr; Back</a>
<h2><span class="badge attr">ATTR</span> form.action</h2>
<div class="card">
<p><b>Source:</b> URL hash or input</p>
<p><b>Sink:</b> <code>form.action = userInput</code></p>
<pre>Try: #javascript:alert('form.action')</pre>
<input id="inp" placeholder="Enter action URL...">
<button onclick="trigger()">Set action</button>
<h3>Output:</h3>
<form id="target" class="output">
  <p>Form action: <span id="display">—</span></p>
  <button type="submit">Submit form (triggers action)</button>
</form>
</div>
<script>
function getSource() {
    return document.getElementById('inp').value ||
           new URLSearchParams(location.search).get('input') ||
           (location.hash ? decodeURIComponent(location.hash.slice(1)) : '');
}
function trigger() {
    var val = getSource();
    document.getElementById('target').action = val;
    document.getElementById('display').textContent = val;
}
if (location.hash || new URLSearchParams(location.search).get('input')) { window.onload = trigger; }
</script>
{% endblock %}
