{% extends "base.html" %}
{% block title %}innerHTML Sink{% endblock %}
{% block content %}
<a class="back" href="/">&larr; Back</a>
<h2><span class="badge html">HTML</span> element.innerHTML</h2>
<div class="card">
<p><b>Source:</b> URL hash <code>#payload</code> or input field</p>
<p><b>Sink:</b> <code>element.innerHTML = userInput</code></p>
<pre>Try: #&lt;img src=x onerror=alert('innerHTML')&gt;</pre>
<input id="inp" placeholder="Enter HTML payload...">
<button onclick="trigger()">Inject</button>
<h3>Output:</h3>
<div class="output" id="output"></div>
</div>
<script>
function getSource() {
    return document.getElementById('inp').value ||
           new URLSearchParams(location.search).get('input') ||
           (location.hash ? decodeURIComponent(location.hash.slice(1)) : '');
}
function trigger() {
    document.getElementById('output').innerHTML = getSource();
}
if (location.hash || new URLSearchParams(location.search).get('input')) { window.onload = trigger; }
</script>
{% endblock %}
