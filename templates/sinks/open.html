{% extends "base.html" %}
{% block title %}window.open Sink{% endblock %}
{% block content %}
<a class="back" href="/">&larr; Back</a>
<h2><span class="badge url">URL</span> window.open()</h2>
<div class="card">
<p><b>Source:</b> URL query <code>?url=</code> or input</p>
<p><b>Sink:</b> <code>window.open(userInput)</code></p>
<pre>Try: ?url=javascript:alert('window.open')</pre>
<input id="inp" placeholder="Enter URL...">
<button onclick="trigger()">Open</button>
</div>
<script>
function trigger() {
    var val = document.getElementById('inp').value ||
              new URLSearchParams(location.search).get('url');
    window.open(val);
}
(function() {
    var val = new URLSearchParams(location.search).get('url');
    if (val) { window.open(val); }
})();
</script>
{% endblock %}
