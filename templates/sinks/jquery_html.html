{% extends "base.html" %}
{% block title %}$.html() Sink{% endblock %}
{% block content %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<a class="back" href="/">&larr; Back</a>
<h2><span class="badge jquery">jQuery</span> $.html()</h2>
<div class="card">
<p><b>Source:</b> URL hash or input</p>
<p><b>Sink:</b> <code>$('#output').html(userInput)</code></p>
<pre>Try: #&lt;img src=x onerror=alert('$.html')&gt;</pre>
<input id="inp" placeholder="Enter HTML payload...">
<button onclick="trigger()">Inject</button>
<h3>Output:</h3>
<div class="output" id="output"></div>
</div>
<script>
function getSource() {
    return document.getElementById('inp').value ||
           new URLSearchParams(location.search).get('input') ||
           (location.hash ? decodeURIComponent(location.hash.slice(1)) : '');
}
function trigger() {
    $('#output').html(getSource());
}
if (location.hash || new URLSearchParams(location.search).get('input')) { $(trigger); }
</script>
{% endblock %}
